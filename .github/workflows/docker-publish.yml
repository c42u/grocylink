# =============================================================================
# GitHub Actions Workflow: Multi-Arch Docker Build & Push
# Projekt:   Grocylink
# Autor:     c42u | Co-Autor: ClaudeCode
# Lizenz:    GPLv3
#
# Beschreibung:
#   Baut ein Multi-Arch Docker Image (amd64, arm64, arm/v7) und pusht es
#   nach Docker Hub. Trigger: Push auf main-Branch oder neuer Version-Tag.
#
# Ziel-Registry:
#   c42u/grocylink-test  (Testphase, privates Repo)
#   → Nach erfolgreichem Test auf c42u/grocylink ändern
#
# Secrets (in GitHub Repository Settings → Secrets → Actions hinterlegen):
#   DOCKERHUB_USERNAME  → Docker Hub Benutzername (c42u)
#   DOCKERHUB_TOKEN     → Docker Hub Access Token (nicht das Passwort!)
#                         Erstellen unter: hub.docker.com → Account Settings
#                         → Personal Access Tokens → Read, Write, Delete
# =============================================================================

name: Build & Push Multi-Arch Docker Image

on:
  # Auslöser 1: Neuer Version-Tag (z.B. v1.0.5)
  push:
    tags:
      - 'v*'

  # Auslöser 2: Manuell über GitHub Actions UI anstoßen
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build & Push (${{ matrix.platform }})
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------------
      # 1. Repository auschecken
      # ------------------------------------------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. QEMU einrichten – notwendig für Cross-Compilation
      #    amd64-Runner kann damit arm64 und arm/v7 Images bauen
      # ------------------------------------------------------------------
      - name: QEMU einrichten (Cross-Compilation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64,linux/arm/v7

      # ------------------------------------------------------------------
      # 3. Docker Buildx einrichten – erweiterter Build-Daemon
      #    mit Multi-Plattform-Unterstützung
      # ------------------------------------------------------------------
      - name: Docker Buildx einrichten
        uses: docker/setup-buildx-action@v3

      # ------------------------------------------------------------------
      # 4. Docker Hub Login
      #    Secrets müssen im GitHub Repo unter Settings → Secrets hinterlegt sein
      # ------------------------------------------------------------------
      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ------------------------------------------------------------------
      # 5. Image-Metadaten & Tags generieren
      #    Bei Tag v1.0.5 entstehen folgende Tags automatisch:
      #      c42u/grocylink-test:1.0.5
      #      c42u/grocylink-test:1.0
      #      c42u/grocylink-test:latest
      # ------------------------------------------------------------------
      - name: Image-Metadaten & Tags generieren
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: c42u/grocylink-test
          tags: |
            # Vollständige Version: 1.0.5
            type=semver,pattern={{version}}
            # Major.Minor: 1.0
            type=semver,pattern={{major}}.{{minor}}
            # latest immer auf neuesten Tag
            type=raw,value=latest

      # ------------------------------------------------------------------
      # 6. Multi-Arch Image bauen und nach Docker Hub pushen
      #    Plattformen:
      #      linux/amd64   → Standard-Server, NAS, Synology, x86-PC
      #      linux/arm64   → Raspberry Pi 4, Pi 5, Apple M-Chips
      #      linux/arm/v7  → Raspberry Pi 2, Pi 3 (32-Bit)
      # ------------------------------------------------------------------
      - name: Multi-Arch Image bauen & pushen
        uses: docker/build-push-action@v6
        with:
          # Build-Kontext ist das Root-Verzeichnis des Repos
          context: .
          # Haupt-Dockerfile (ohne Caddy)
          file: ./docker/Dockerfile
          # Alle Ziel-Plattformen
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          # push: true → direkt nach Docker Hub pushen
          push: true
          # Generierte Tags und Labels aus Schritt 5 verwenden
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # OCI-Labels als Build-Args übergeben (befüllt durch metadata-action)
          build-args: |
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VERSION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.version'] }}
            REVISION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.revision'] }}
          # Layer-Cache für schnellere Folge-Builds (GitHub Actions Cache)
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ------------------------------------------------------------------
      # 7. Build-Zusammenfassung ausgeben
      # ------------------------------------------------------------------
      - name: Build-Zusammenfassung
        run: |
          echo "## Docker Image erfolgreich gepusht" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Repository:** c42u/grocylink-test" >> $GITHUB_STEP_SUMMARY
          echo "**Plattformen:** linux/amd64, linux/arm64, linux/arm/v7" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '${{ steps.meta.outputs.tags }}' | tr ',' '\n' | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY
