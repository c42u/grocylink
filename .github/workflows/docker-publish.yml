# =============================================================================
# GitHub Actions Workflow: Docker Build & Push
# Projekt:   Grocylink
# Autor:     c42u | Co-Autor: ClaudeCode
# Lizenz:    GPLv3
#
# Beschreibung:
#   Baut ein Docker Image (amd64) und pusht es nach Docker Hub.
#   Trigger: Neuer Version-Tag oder manueller Start.
#
# Ziel-Registry:
#   c42u/grocylink
#
# Secrets (in GitHub Repository Settings → Secrets → Actions hinterlegen):
#   DOCKERHUB_USERNAME  → Docker Hub Benutzername (c42u)
#   DOCKERHUB_TOKEN     → Docker Hub Access Token (nicht das Passwort!)
#                         Erstellen unter: hub.docker.com → Account Settings
#                         → Personal Access Tokens → Read, Write, Delete
# =============================================================================

name: Build & Push Docker Image

on:
  # Auslöser 1: Neuer Version-Tag (z.B. v1.1.0)
  push:
    tags:
      - 'v*'

  # Auslöser 2: Manuell über GitHub Actions UI anstoßen
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------------
      # 1. Repository auschecken
      # ------------------------------------------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Docker Buildx einrichten
      # ------------------------------------------------------------------
      - name: Docker Buildx einrichten
        uses: docker/setup-buildx-action@v3

      # ------------------------------------------------------------------
      # 3. Docker Hub Login
      #    Secrets müssen im GitHub Repo unter Settings → Secrets hinterlegt sein
      # ------------------------------------------------------------------
      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ------------------------------------------------------------------
      # 4. Image-Metadaten & Tags generieren
      #    Bei Tag v1.1.0 entstehen folgende Tags automatisch:
      #      c42u/grocylink:1.1.0
      #      c42u/grocylink:1.1
      #      c42u/grocylink:latest
      # ------------------------------------------------------------------
      - name: Image-Metadaten & Tags generieren
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: c42u/grocylink
          tags: |
            # Vollständige Version: 1.1.0
            type=semver,pattern={{version}}
            # Major.Minor: 1.1
            type=semver,pattern={{major}}.{{minor}}
            # latest immer auf neuesten Tag
            type=raw,value=latest

      # ------------------------------------------------------------------
      # 5. Docker Image bauen und nach Docker Hub pushen
      #    Plattform: linux/amd64 (Standard-Server, NAS, Synology, x86-PC)
      # ------------------------------------------------------------------
      - name: Docker Image bauen & pushen
        uses: docker/build-push-action@v6
        with:
          # Build-Kontext ist das Root-Verzeichnis des Repos
          context: .
          # Haupt-Dockerfile (ohne Caddy)
          file: ./docker/Dockerfile
          # Ziel-Plattform
          platforms: linux/amd64
          # push: true → direkt nach Docker Hub pushen
          push: true
          # Generierte Tags und Labels aus Schritt 4 verwenden
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # OCI-Labels als Build-Args übergeben (befüllt durch metadata-action)
          build-args: |
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VERSION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.version'] }}
            REVISION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.revision'] }}
          # Layer-Cache für schnellere Folge-Builds (GitHub Actions Cache)
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ------------------------------------------------------------------
      # 6. Build-Zusammenfassung ausgeben
      # ------------------------------------------------------------------
      - name: Build-Zusammenfassung
        run: |
          echo "## Docker Image erfolgreich gepusht" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Repository:** c42u/grocylink" >> $GITHUB_STEP_SUMMARY
          echo "**Plattform:** linux/amd64" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '${{ steps.meta.outputs.tags }}' | tr ',' '\n' | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY
